server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native # 'native' = read config from local filesystem (dev mode)
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config-repo

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh
  endpoint:
    health:
      show-details: always

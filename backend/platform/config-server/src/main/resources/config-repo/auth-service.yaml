server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/shownest_auth
    username: ${DB_USERNAME:shownest}
    password: ${DB_PASSWORD:shownest123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-256-bit-secret-key-in-production-env}
    expiration-ms: 86400000 # 24 hours
    refresh-expiration-ms: 604800000 # 7 days
